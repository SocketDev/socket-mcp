packages:
  - .claude/hooks/*
  - '.config/fleet/oxlint-plugin'
  - '.config/fleet/oxlint-plugin/fleet/*'
allowBuilds:
  cpu-features: false
  esbuild: true
  protobufjs: false
  ssh2: false
autoInstallPeers: true

blockExoticSubdeps: true
confirmModulesPurge: false
managePackageManagerVersions: false

catalog:
  '@anthropic-ai/claude-code': 2.1.201
  '@redwoodjs/agent-ci': 0.16.2
  '@sinclair/typebox': 0.34.50
  '@socketregistry/packageurl-js': 1.4.2
  '@socketregistry/packageurl-js-stable': npm:@socketregistry/packageurl-js@1.4.2
  '@socketsecurity/lib': 6.0.10
  '@socketsecurity/lib-stable': npm:@socketsecurity/lib@6.0.10
  '@socketsecurity/registry': 2.0.2
  '@socketsecurity/registry-stable': npm:@socketsecurity/registry@2.0.2
  '@socketsecurity/sdk': 4.0.1
  '@socketsecurity/sdk-stable': npm:@socketsecurity/sdk@4.0.1
  '@types/mdast': 4.0.4
  '@types/node': 26.1.1
  '@types/semver': 7.7.1
  '@types/shell-quote': 1.7.5
  '@typescript/native-preview': 7.0.0-dev.20260510.1
  '@ultrathink/acorn.wasm': npm:@ultrathink/acorn-wasm@0.0.1
  '@vitest/coverage-v8': 4.1.10
  '@vitest/ui': 4.1.10
  'c8': 11.0.0
  'chrome-devtools-mcp': 1.5.0
  'compromise': 14.15.1
  'dtu-github-actions': 0.16.2
  'ecc-agentshield': 1.4.0
  'magic-string': 0.30.21
  'markdownlint-cli2': 0.23.0
  'mdast-util-from-markdown': 2.0.3
  'micromark': 4.0.2
  'neosanitize': 0.3.0
  'nock': 15.0.0
  'npm-run-all2': 9.0.2
  'oxfmt': 0.58.0
  'oxlint': 1.73.0
  'playwright-core': 1.61.1
  'regjsparser': 0.13.2
  'rolldown': 1.1.4
  'semver': 7.8.5
  'shell-quote': 1.9.0
  'svgo': 4.0.1
  'taze': 19.14.1
  'typescript': 7.0.2
  'untracked': 1.6.1
  'vite': 8.1.0
  'vitest': 4.1.10
enablePrePostScripts: true

# Force every consumer of Socket's own packages to resolve through the
# catalog-pinned published versions. The `catalog:` form rewrites
# `workspace:*`, `^x.y.z`, and bare-version specs alike to the version
# in the default `catalog:` block above. This defeats accidental
# local-checkout resolution when a sibling repo is on disk.
overrides:
  # Fleet-canonical overrides (managed by socket-wheelhouse sync; do not edit).
  '@socketregistry/packageurl-js': 'catalog:'
  '@socketsecurity/lib': 'catalog:'
  '@socketsecurity/registry': 'catalog:'
  '@socketsecurity/sdk': 'catalog:'
  'chalk@>=5': '5.6.2'
  'es-define-property': 'npm:@socketregistry/es-define-property@1.0.7'
  'es-set-tostringtag': 'npm:@socketregistry/es-set-tostringtag@1.0.10'
  'function-bind': 'npm:@socketregistry/function-bind@1.0.7'
  'glob': '13.0.6'
  'gopd': 'npm:@socketregistry/gopd@1.0.7'
  'has-symbols': 'npm:@socketregistry/has-symbols@1.0.7'
  'has-tostringtag': 'npm:@socketregistry/has-tostringtag@1.0.7'
  'hasown': 'npm:@socketregistry/hasown@1.0.7'
  'iconv-lite': '0.7.2'
  'isexe@>=3': '4.0.0'
  'lru-cache@>=10': '11.3.6'
  'magic-string': '1.0.0'
  'mime-db': '1.54.0'
  'mime-types@>=3': '3.0.2'
  'minipass@>=4': '7.1.3'
  'safe-buffer': 'npm:@socketregistry/safe-buffer@1.0.9'
  'safer-buffer': 'npm:@socketregistry/safer-buffer@1.0.10'
  'semver@>=5.0.0 <7.6.0': '7.8.1'
  'side-channel': 'npm:@socketregistry/side-channel@1.0.10'
  'ssri@>=12': '13.0.1'
  'string-width@>=5': '8.1.0'
  'update-notifier@>=4.0.0': '7.3.1'
  'uuid': '11.1.1'
  'which': '7.0.0'
  'wrap-ansi@>=8': '9.0.2'
  'yaml@2': '2.9.0'

  # Repo-specific overrides below.
  '@hono/node-server': '1.19.13'
  'fast-uri': '3.1.2'
  # GHSA-xrhx-7g5j-rcj5 IPv6 deny-rule bypass / GHSA-3hrh-pfw6-9m5x Set-Cookie
  # injection / GHSA-f577-qrjj-4474 JWT scheme / GHSA-2gcr-mfcq-wcc3 mount
  # prefix; transitive via @modelcontextprotocol/sdk, fixed in 4.12.21
  'hono': '4.12.23'
  'ip-address': '10.1.1'
  # CVE-2026-... node-forge prototype-pollution-class advisories #55/#57/#59/#61
  'node-forge': '1.4.0'
  # GHSA-9wv6-86v2-598j path-to-regexp DoS / GHSA-rhx6-c78j-4q9w; advisories #51/#53
  'path-to-regexp': '8.4.2'
  # GHSA-q8mj-m7cp-5q26 qs (transitive via express/body-parser); fixed in 6.15.2
  'qs': '6.15.2'
  # GHSA-w7jw-789q-3m8p quote() does not escape newlines in object .op values
  # (transitive via npm-run-all2); fixed in 1.8.4
  'shell-quote': '1.8.4'
  # advisory #42 GHSA-ph9p-34f9-6g65 symlink-traversal;
  # advisory #104 GHSA-7c78-jf6q-g5cm type-confusion path traversal; fixed in 0.2.7
  'tmp': '0.2.7'
  # GHSA-fx2h-pf6j-xcff server.fs.deny bypass / GHSA-v6wh-96g9-6wx3 NTLMv2
  # hash disclosure (Windows); transitive via vitest, fixed in 8.0.16
  'vite': '8.0.16'
  'which@>=4': '7.0.0'
  'zod': '3.25.76'
  'zod-to-json-schema': '3.25.1'

minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - '@socketaddon/*'
  - '@socketbin/*'
  - '@socketregistry/*'
  - '@socketsecurity/*'
  - '@stuie/*'
  - 'sfw'
  - '@ultrathink/*'
  # security fix for GHSA-ph9p-34f9-6g65; bypassing soak to land the patch now
  - '@socketoverride/*'
  - 'socket'
  - '@sdxgen/*'
  - 'sdxgen'
  - 'stuie'

# Transitional: warn (not error) while the socket-registry CI install chain
# still ships pnpm 11.5.1 and this repo runs 11.6.0. Restore to error once the
# registry reusable-workflow nested pin delivers 11.6.0.
pmOnFail: warn
resolutionMode: highest
saveExact: true
trustPolicy: no-downgrade
trustPolicyExclude:
  # Transitive dep of @vitest/coverage-v8 (catalog-pinned 4.1.6).
  # Authored by ariperkkio, the vitest coverage maintainer
  # (github.com/AriPerkkio/ast-v8-to-istanbul); Socket's no-downgrade
  # gate flags 1.0.2 only because it published 2026-05-25 (inside the
  # soak window). Legitimate first-party vitest tooling, not a takeover.
  - 'ast-v8-to-istanbul@1.0.2'
  - 'compromise@14.15.0'
  - 'undici-types@6.21.0'
