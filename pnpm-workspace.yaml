packages:
  - .claude/hooks/*
allowBuilds:
  esbuild: true
autoInstallPeers: true

blockExoticSubdeps: true

catalog:
  '@sinclair/typebox': 0.34.49
  '@socketregistry/packageurl-js-stable': npm:@socketregistry/packageurl-js@1.4.2
  '@socketsecurity/lib-stable': npm:@socketsecurity/lib@5.28.0
  '@socketsecurity/registry-stable': npm:@socketsecurity/registry@2.0.2
  '@socketsecurity/sdk-stable': npm:@socketsecurity/sdk@4.0.1
  '@types/mdast': 4.0.4
  '@types/node': 24.9.2
  '@typescript/native-preview': 7.0.0-dev.20260415.1
  '@vitest/coverage-v8': 4.1.6
  '@vitest/ui': 4.1.6
  'ecc-agentshield': 1.4.0
  'mdast-util-from-markdown': 2.0.3
  'micromark': 4.0.2
  'oxfmt': 0.37.0
  'oxlint': 1.52.0
  'taze': 19.9.2
  'vitest': 4.1.6
enablePrePostScripts: true

minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - '@socketaddon/*'
  - '@socketbin/*'
  - '@socketregistry/*'
  - '@socketsecurity/*'
  - '@stuie/*'

pmOnFail: error
resolutionMode: highest
saveExact: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - 'compromise@14.15.0'
  - 'undici-types@6.21.0'
