# CI installs pnpm from its native bin via the shared setup workflow, not
# corepack, so the runner's pnpm differs from the `packageManager` pin (which
# is informational). `ignore` stops pnpm's package-manager-version self-check
# from hard-failing every command on that mismatch.
pmOnFail: ignore
resolutionMode: highest
saveExact: true
trustPolicy: no-downgrade
trustPolicyExclude:
  # Transitive dep of @vitest/coverage-v8 (catalog-pinned 4.1.6).
  # Authored by ariperkkio, the vitest coverage maintainer
  # (github.com/AriPerkkio/ast-v8-to-istanbul); Socket's no-downgrade
  # gate flags 1.0.2 only because it published 2026-05-25 (inside the
  # soak window). Legitimate first-party vitest tooling, not a takeover.
  - 'ast-v8-to-istanbul@1.0.2'
  - 'compromise@14.15.0'
  - 'undici-types@6.21.0'
