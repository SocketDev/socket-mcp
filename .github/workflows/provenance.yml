# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: 📦 Publish to npm

# Dependencies:
#   - SocketDev/socket-registry/.github/workflows/provenance.yml

on:
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug output'
        required: false
        default: '0'
        type: string
        options:
          - '0'
          - '1'
      dry-run:
        description: 'Dry run (no publish, no tag)'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    uses: SocketDev/socket-registry/.github/workflows/provenance.yml@74f3353793b9a9619bef7badae29821260bd4225 # main (2026-05-28)
    with:
      debug: ${{ inputs.debug }}
      dry-run: ${{ inputs.dry-run }}
      node-version: '26.2.0'
      package-name: '@socketsecurity/mcp'
      scope: '@socketsecurity'
      setup-script: 'pnpm run build'
      publish-script: >-
        if [ "$DRY_RUN" = "true" ]; then
        npm publish --provenance --access public --dry-run;
        else
        npm publish --provenance --access public;
        fi
      use-trusted-publishing: true
    secrets:
      SOCKET_API_TOKEN: ${{ secrets.SOCKET_API_TOKEN }}
